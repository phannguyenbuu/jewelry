<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - KITCHOR</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="scripts.js"></script>
</head>
<body>
  <nav class="nav container" style="position: sticky; top:0;">
    <div class="brand"><img src="./assets/logo.svg" alt="logo"/>KITCHOR</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="projects.html">Projects</a>

  <section class="section container" id="contact">
    <div class="section-title">Liên hệ</div>
    <form>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <input placeholder="Tên" style="padding:12px; border-radius:6px; background:#111628; border:1px solid #333; color:#fff;" />
        <input placeholder="Email" style="padding:12px; border-radius:6px; background:#111628; border:1px solid #333; color:#fff;" />
      </div>
      <div style="margin-top:12px;"><textarea placeholder="Tin nhắn" style="width:100%; height:120px; padding:12px; border-radius:6px; background:#111628; border:1px solid #333; color:#fff;"></textarea></div>
      <button type="submit" class="btn" style="margin-top:12px;">Gửi</button>
    </form>
  </section>
  <footer class="footer">
    <div class="container">© 2026 KITCHOR. All rights reserved.</div>
  </footer>
